openapi: 3.0.3
info:
  title: Personal Finance and Subscription Tracker API
  version: 1.0.0
  description: Документация за курсова работа на тема "Personal Finance and Subscription Tracker" изработена от Андон Киндеков №2401321075. Системата е
    планирана като клиент-сървър приложение с C# ASP.NET Core Web API, MySQL база данни и клиентски интерфейс. API-то описва услуги за потребители,
    категории, финансови записи, външни абонаменти/регулярни разходи, месечни бюджети, спестовни цели и справки. Абонаментите в тази система са
    външни услуги, които потребителят следи като регулярни разходи (например Spotify, Netflix, интернет, фитнес или софтуерна услуга).
    Системата е предназначена за лична отчетност, планиране на месечни разходи, проследяване на външни абонаменти и управление на спестовни цели. Всички суми са информационни и служат само за планиране, отчетност и личен бюджет.

servers:
- url: https://localhost:5001
  description: Local HTTPS development server
- url: http://localhost:5000
  description: Local HTTP development server
tags:
- name: System
  description: Технически услуги за проверка на състоянието на API-то.
- name: Authentication
  description: Услуги за регистрация, вход, изход и текущ потребител.
- name: Users
  description: CRUD услуги за потребителски профили.
- name: Categories
  description: CRUD услуги за категории на приходи, разходи, външни абонаменти и спестявания.
- name: FinancialRecords
  description: CRUD услуги за приходи и разходи.
- name: Subscriptions
  description: CRUD услуги за проследяване на външни абонаменти и регулярни разходи като информационни записи.
- name: Budgets
  description: CRUD услуги за месечни бюджети по категории.
- name: SavingsGoals
  description: CRUD услуги за лични спестовни цели, например кола, апартамент, техника или пътуване.
- name: Reports
  description: Справки, обобщения и анализ на личните финанси.
paths:
  /api/system/health:
    get:
      tags:
      - System
      summary: Проверява дали API услугата работи.
      description: Връща базова информация за състоянието на системата, версията на API-то и връзката с базата данни.
      responses:
        '200':
          description: API услугата работи.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/auth/register:
    post:
      tags:
      - Authentication
      summary: Регистрира нов потребител.
      description: Създава нов потребителски профил. Имейлът трябва да бъде уникален, а паролата трябва да отговаря на минималните изисквания
        за сигурност.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Успешна регистрация.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/auth/login:
    post:
      tags:
      - Authentication
      summary: Вход в системата.
      description: Валидира имейл и парола и връща JWT access token за достъп до защитените услуги.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешен вход.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/auth/logout:
    post:
      tags:
      - Authentication
      summary: Изход от системата.
      description: Клиентът изтрива локално съхранения JWT token. В бъдеща реализация може да се добави blacklist за токени.
      security:
      - bearerAuth: []
      responses:
        '204':
          description: Успешен изход.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/auth/me:
    get:
      tags:
      - Authentication
      summary: Връща текущия автентикиран потребител.
      description: Използва JWT токена, за да определи кой е текущият потребител.
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Данни за текущия потребител.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/users:
    get:
      tags:
      - Users
      summary: Връща списък с потребители.
      description: Поддържа търсене по име или имейл, филтриране по активност, странициране и сортиране. В стандартна реализация тази услуга може
        да бъде достъпна само за администратор.
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/SearchQuery'
      - name: isActive
        in: query
        required: false
        schema:
          type: boolean
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - name: sortBy
        in: query
        required: false
        schema:
          type: string
          enum:
          - firstName
          - lastName
          - email
          - createdAt
          default: createdAt
      - $ref: '#/components/parameters/SortDirection'
      responses:
        '200':
          description: Успешно върнат списък.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedUserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
      - Users
      summary: Създава нов потребител.
      description: CRUD операция Create за модел User. Валидира уникален имейл, дължина на имената, роля и основна валута.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: Ресурсът е създаден успешно.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/users/{id}:
    get:
      tags:
      - Users
      summary: Връща потребител по ID.
      description: Извлича конкретен ресурс, като проверява дали принадлежи на текущия потребител.
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Ресурсът е намерен.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
      - Users
      summary: Редактира потребител.
      description: CRUD операция Update. Валидира входните данни и актуализира ресурса само ако принадлежи на текущия потребител.
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: Ресурсът е редактиран успешно.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags:
      - Users
      summary: Изтрива потребител.
      description: CRUD операция Delete. При реализацията може да се използва меко изтриване чрез isActive=false, когато ресурсът участва във
        връзки с други записи.
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/PathId'
      responses:
        '204':
          description: Ресурсът е изтрит успешно.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/categories:
    get:
      tags:
      - Categories
      summary: Връща списък с категории.
      description: Извлича категориите на текущия потребител. Поддържа търсене по име, филтриране по тип категория и активност, странициране и
        сортиране.
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/SearchQuery'
      - name: categoryType
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/CategoryType'
      - name: isActive
        in: query
        required: false
        schema:
          type: boolean
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - name: sortBy
        in: query
        required: false
        schema:
          type: string
          enum:
          - name
          - categoryType
          - createdAt
          default: name
      - $ref: '#/components/parameters/SortDirection'
      responses:
        '200':
          description: Успешно върнат списък.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedCategoryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
      - Categories
      summary: Създава нова категория.
      description: CRUD операция Create за модел Category. Категорията може да се използва за приходи, разходи, външни абонаменти или спестявания.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryCreateRequest'
      responses:
        '201':
          description: Ресурсът е създаден успешно.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/categories/{id}:
    get:
      tags:
      - Categories
      summary: Връща категория по ID.
      description: Извлича конкретен ресурс, като проверява дали принадлежи на текущия потребител.
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Ресурсът е намерен.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
      - Categories
      summary: Редактира категория.
      description: CRUD операция Update. Валидира входните данни и актуализира ресурса само ако принадлежи на текущия потребител.
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryUpdateRequest'
      responses:
        '200':
          description: Ресурсът е редактиран успешно.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags:
      - Categories
      summary: Изтрива категория.
      description: CRUD операция Delete. При реализацията може да се използва меко изтриване чрез isActive=false, когато ресурсът участва във
        връзки с други записи.
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/PathId'
      responses:
        '204':
          description: Ресурсът е изтрит успешно.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/financial-records:
    get:
      tags:
      - FinancialRecords
      summary: Връща списък с финансови записи.
      description: Извлича приходите и разходите на текущия потребител. Поддържа филтриране по категория, тип запис, период, сума и текстово търсене,
        както и странициране и сортиране.
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/SearchQuery'
      - name: recordType
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/RecordType'
      - name: categoryId
        in: query
        required: false
        schema:
          type: integer
          format: int64
          minimum: 1
      - name: fromDate
        in: query
        required: false
        schema:
          type: string
          format: date
      - name: toDate
        in: query
        required: false
        schema:
          type: string
          format: date
      - name: minAmount
        in: query
        required: false
        schema:
          type: number
          format: decimal
          minimum: 0
      - name: maxAmount
        in: query
        required: false
        schema:
          type: number
          format: decimal
          minimum: 0
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - name: sortBy
        in: query
        required: false
        schema:
          type: string
          enum:
          - amount
          - recordDate
          - createdAt
          - categoryName
          default: recordDate
      - $ref: '#/components/parameters/SortDirection'
      responses:
        '200':
          description: Успешно върнат списък.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedFinancialRecordResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
      - FinancialRecords
      summary: Създава нов финансов запис.
      description: CRUD операция Create за модел FinancialRecord. Записът представлява приход или разход за лична отчетност.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinancialRecordCreateRequest'
      responses:
        '201':
          description: Ресурсът е създаден успешно.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinancialRecordResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/financial-records/{id}:
    get:
      tags:
      - FinancialRecords
      summary: Връща финансов запис по ID.
      description: Извлича конкретен ресурс, като проверява дали принадлежи на текущия потребител.
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Ресурсът е намерен.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinancialRecordResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
      - FinancialRecords
      summary: Редактира финансов запис.
      description: CRUD операция Update. Валидира входните данни и актуализира ресурса само ако принадлежи на текущия потребител.
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinancialRecordUpdateRequest'
      responses:
        '200':
          description: Ресурсът е редактиран успешно.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinancialRecordResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags:
      - FinancialRecords
      summary: Изтрива финансов запис.
      description: CRUD операция Delete. При реализацията може да се използва меко изтриване чрез isActive=false, когато ресурсът участва във
        връзки с други записи.
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/PathId'
      responses:
        '204':
          description: Ресурсът е изтрит успешно.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/subscriptions:
    get:
      tags:
      - Subscriptions
      summary: Връща списък с външни абонаменти и регулярни разходи.
      description: Извлича външните абонаменти на текущия потребител, например Spotify, Netflix, интернет, фитнес или друга регулярна услуга.
        Поддържа филтриране по категория, статус, цикъл, дата на следващо начисляване и сума.
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/SearchQuery'
      - name: categoryId
        in: query
        required: false
        schema:
          type: integer
          format: int64
          minimum: 1
      - name: status
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/SubscriptionStatus'
      - name: cycle
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/RenewalCycle'
      - name: nextDueFrom
        in: query
        required: false
        schema:
          type: string
          format: date
      - name: nextDueTo
        in: query
        required: false
        schema:
          type: string
          format: date
      - name: minAmount
        in: query
        required: false
        schema:
          type: number
          format: decimal
          minimum: 0
      - name: maxAmount
        in: query
        required: false
        schema:
          type: number
          format: decimal
          minimum: 0
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - name: sortBy
        in: query
        required: false
        schema:
          type: string
          enum:
          - name
          - amount
          - nextDueDate
          - createdAt
          - status
          default: nextDueDate
      - $ref: '#/components/parameters/SortDirection'
      responses:
        '200':
          description: Успешно върнат списък.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedSubscriptionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
      - Subscriptions
      summary: Създава запис за външен абонамент.
      description: CRUD операция Create за модел Subscription. Този запис служи само за проследяване на регулярен разход, месечно планиране и лична отчетност.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionCreateRequest'
      responses:
        '201':
          description: Ресурсът е създаден успешно.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/subscriptions/{id}:
    get:
      tags:
      - Subscriptions
      summary: Връща външен абонамент по ID.
