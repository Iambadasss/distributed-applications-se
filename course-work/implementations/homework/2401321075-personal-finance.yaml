components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer token, получен при вход в системата.
  parameters:
    PathId:
      name: id
      in: path
      required: true
      description: Уникален идентификатор на ресурса.
      schema:
        type: integer
        format: int64
        minimum: 1
    SearchQuery:
      name: search
      in: query
      required: false
      description: Текстово търсене по име, описание или друг подходящ текстов атрибут.
      schema:
        type: string
        maxLength: 100
    Page:
      name: page
      in: query
      required: false
      description: Номер на страницата при странициране.
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      required: false
      description: Брой елементи на страница.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
    SortDirection:
      name: sortDirection
      in: query
      required: false
      description: Посока на сортиране.
      schema:
        type: string
        enum:
        - asc
        - desc
        default: asc
  responses:
    ValidationError:
      description: Невалидни входни данни.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationProblemDetails'
    Unauthorized:
      description: Липсващ, невалиден или изтекъл JWT token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    NotFound:
      description: Ресурсът не е намерен или не принадлежи на текущия потребител.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Conflict:
      description: Конфликт на данни, например дублиран уникален запис или ресурс, който се използва от други записи.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    InternalServerError:
      description: Вътрешна сървърна грешка. API-то не трябва да връща stack trace към клиента.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
  schemas:
    RecordType:
      type: string
      enum:
      - income
      - expense
      description: 'Тип финансов запис: приход или разход.'
    CategoryType:
      type: string
      enum:
      - income
      - expense
      - subscription
      - saving
      description: Тип категория според употребата ѝ в системата.
    SubscriptionStatus:
      type: string
      enum:
      - active
      - paused
      - cancelled
      - expired
      description: Статус на външен абонамент/регулярен разход.
    RenewalCycle:
      type: string
      enum:
      - weekly
      - monthly
      - quarterly
      - yearly
      - custom
      description: Цикъл на външния абонамент. Използва се само за планиране и справки.
    SavingsGoalStatus:
      type: string
      enum:
      - active
      - completed
      - cancelled
      description: Статус на спестовна цел.
    CurrencyCode:
      type: string
      enum:
      - BGN
      - EUR
      - USD
      description: Валута на информационните суми в системата.
    ProblemDetails:
      type: object
      description: Стандартизиран отговор при грешка, съвместим с RFC 7807 Problem Details.
      properties:
        type:
          type: string
          example: https://example.com/errors/not-found
        title:
          type: string
          example: Resource not found
        status:
          type: integer
          example: 404
        detail:
          type: string
